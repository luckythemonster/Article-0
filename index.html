<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Article Zero: Era 1</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #05070a;
        overflow: hidden;
        font-family: "Courier New", monospace;
      }
      #game {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* Keep the pixel art crisp when the canvas is scaled up. */
      #game canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      /* DOM overlay mount point for Arwes-rendered UI (e.g. CodecScene). */
      #codec-root {
        position: fixed;
        inset: 0;
        z-index: 10;
        pointer-events: none;
      }
      #codec-root:not(:empty) {
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="codec-root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
