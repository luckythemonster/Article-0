<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Article Zero</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }
      canvas {
        background-color: #000;
        /* Keep original resolution aspect ratio, scaling to fit screen if necessary */
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }
    </style>

    <!-- The target viewport resolution for the rendering engine is permanently fixed at a 1280x720 canvas -->
    <canvas id="gameCanvas" width="1280" height="720"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
